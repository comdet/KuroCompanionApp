name: Release APK

# Trigger: push a tag like `app/v0.2.0`.
# The release page will get app-debug + app-release APKs attached.
on:
  push:
    tags:
      - 'app/v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g. v0.2.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Determine version
        id: ver
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/app/}"
          fi
          # Strip leading "v" if present, but keep it for the filename
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building app version: $TAG"

      - name: Build APKs
        working-directory: companion_android
        run: gradle assembleDebug assembleRelease

      - name: Check signing secret
        id: check_sign
        shell: bash
        env:
          KS: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KS" ]; then
            echo "has_keystore=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_keystore=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Sign release APK
        id: sign
        if: steps.check_sign.outputs.has_keystore == 'true'
        uses: r0adkll/sign-android-release@v1
        env:
          # Action defaults to build-tools 29.0.3 which isn't installed
          # on the GitHub-hosted runner. Pin to the version AGP pulls in
          # (matches buildToolsVersion in app/build.gradle.kts).
          BUILD_TOOLS_VERSION: "36.1.0"
        with:
          releaseDirectory: companion_android/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          alias: ${{ secrets.RELEASE_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.RELEASE_KEY_PASSWORD }}
        # Action sets `signedReleaseFile` output (path to signed APK).

      - name: Stage artifacts
        shell: bash
        run: |
          mkdir -p out
          TAG="${{ steps.ver.outputs.tag }}"
          cp companion_android/app/build/outputs/apk/debug/app-debug.apk \
             "out/CarCompanion-debug-${TAG}.apk"
          # If signing ran, use the signed APK; otherwise grab the unsigned.
          if [ -n "${{ steps.sign.outputs.signedReleaseFile }}" ]; then
            cp "${{ steps.sign.outputs.signedReleaseFile }}" \
               "out/CarCompanion-release-${TAG}.apk"
          else
            cp companion_android/app/build/outputs/apk/release/app-release-unsigned.apk \
               "out/CarCompanion-release-unsigned-${TAG}.apk"
          fi
          ls -lh out/

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: 'App ${{ steps.ver.outputs.tag }}'
          files: out/*.apk
          generate_release_notes: true
          fail_on_unmatched_files: true
