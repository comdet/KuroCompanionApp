org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8 -Duser.country=US -Duser.language=en
# ↑ Force locale=en_US for the Gradle/AGP JVM.
# Reason: apkzlib's MsDosDateTimeUtils.packDate uses Calendar.getInstance()
# without specifying locale. On th_TH systems Java falls back to
# BuddhistCalendar which reports year in พ.ศ. (e.g. 2569 instead of 2026).
# packDate then computes yearOffset = 2569 - 1980 = 589 and trips
# Verify.verify(yearOffset < 128), failing mergeDebugJavaResource with an
# empty VerifyException. Forcing en_US for the build JVM only affects the
# build process — the APK's runtime locale is unaffected.
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.configuration-cache=false

android.useAndroidX=true
android.nonTransitiveRClass=true

kotlin.code.style=official
